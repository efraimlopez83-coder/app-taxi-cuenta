<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Menorca Connect</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:white}
header{text-align:center;padding:20px;background:linear-gradient(135deg,#facc15,#f97316);color:#111}
h1{margin:0}
.tabs{display:flex}
.tabs button{flex:1;padding:14px;border:0;font-weight:bold;background:#1e293b;color:white}
.tabs button.active{background:#facc15;color:#111}
.page{display:none;padding:18px}
.page.active{display:block}
.card{background:#1e293b;border-radius:16px;padding:16px;margin-bottom:14px}
input,textarea,select{width:100%;padding:13px;margin:8px 0;border-radius:12px;border:0;font-size:16px}
button.main{width:100%;padding:14px;border:0;border-radius:14px;background:#22c55e;color:white;font-size:17px;font-weight:bold;margin-top:10px}
button.accept{background:#3b82f6}
button.delete{background:#ef4444}
.badge{display:inline-block;padding:5px 10px;border-radius:999px;background:#facc15;color:#111;font-weight:bold}
.small{color:#cbd5e1;font-size:14px}
</style>
</head>
<body>

<header>
<h1>🚕 Taxi Menorca Connect</h1>
<p>Demo pasajero ↔ taxista</p>
</header>

<div class="tabs">
<button class="active" onclick="showPage('pasajero',this)">Pasajero</button>
<button onclick="showPage('taxista',this)">Taxista</button>
</div>

<div id="pasajero" class="page active">
  <div class="card">
    <h2>Pedir taxi</h2>
    <input id="nombre" placeholder="Tu nombre">
    <input id="telefono" placeholder="Teléfono">
    <input id="origen" placeholder="Origen: Hotel, calle, aeropuerto...">
    <input id="destino" placeholder="Destino">
    <textarea id="nota" placeholder="Nota opcional"></textarea>
    <button class="main" onclick="pedirTaxi()">🚕 Pedir taxi</button>
  </div>

  <div class="card">
    <h3>Estado de tu solicitud</h3>
    <div id="estadoPasajero" class="small">Aún no has pedido taxi.</div>
  </div>
</div>

<div id="taxista" class="page">
  <div class="card">
    <h2>Solicitudes pendientes</h2>
    <div id="listaSolicitudes"></div>
  </div>
</div>

<script>
let solicitudes = JSON.parse(localStorage.getItem("solicitudesTaxiMenorca")) || [];

function guardar(){
  localStorage.setItem("solicitudesTaxiMenorca", JSON.stringify(solicitudes));
  render();
}

function showPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
  render();
}

function pedirTaxi(){
  const nombre=document.getElementById("nombre").value.trim();
  const telefono=document.getElementById("telefono").value.trim();
  const origen=document.getElementById("origen").value.trim();
  const destino=document.getElementById("destino").value.trim();
  const nota=document.getElementById("nota").value.trim();

  if(!nombre || !telefono || !origen || !destino){
    alert("Rellena nombre, teléfono, origen y destino.");
    return;
  }

  const solicitud={
    id:Date.now(),
    nombre,
    telefono,
    origen,
    destino,
    nota,
    estado:"Pendiente",
    hora:new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})
  };

  solicitudes.unshift(solicitud);
  guardar();

  document.getElementById("estadoPasajero").innerHTML =
    `✅ Solicitud enviada<br><br>
    <span class="badge">Pendiente</span><br>
    ${origen} → ${destino}`;

  alert("Solicitud enviada al taxista.");
}

function aceptarTaxi(id){
  solicitudes = solicitudes.map(s=>{
    if(s.id===id){s.estado="Aceptado por taxista";}
    return s;
  });
  guardar();
}

function borrarSolicitud(id){
  solicitudes = solicitudes.filter(s=>s.id!==id);
  guardar();
}

function render(){
  const lista=document.getElementById("listaSolicitudes");
  if(!solicitudes.length){
    lista.innerHTML="<p class='small'>No hay solicitudes todavía.</p>";
    return;
  }

  lista.innerHTML=solicitudes.map(s=>`
    <div class="card">
      <h3>${s.origen} → ${s.destino}</h3>
      <p><b>Cliente:</b> ${s.nombre}</p>
      <p><b>Tel:</b> <a style="color:#facc15" href="tel:${s.telefono}">${s.telefono}</a></p>
      <p><b>Hora:</b> ${s.hora}</p>
      <p><b>Nota:</b> ${s.nota || "Sin nota"}</p>
      <p><span class="badge">${s.estado}</span></p>
      <button class="main accept" onclick="aceptarTaxi(${s.id})">Aceptar servicio</button>
      <button class="main delete" onclick="borrarSolicitud(${s.id})">Borrar</button>
    </div>
  `).join("");
}

render();
</script>

</body>
</html>
