<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Menorca Connect Maps</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#020617;color:white}
header{padding:20px;text-align:center;background:linear-gradient(135deg,#facc15,#f97316);color:#111}
header h1{margin:0;font-size:25px}
header p{margin:5px 0 0;font-weight:700}
.tabs{display:flex;background:#0f172a;position:sticky;top:0;z-index:10}
.tabs button{flex:1;padding:14px;border:0;background:#0f172a;color:#94a3b8;font-weight:900}
.tabs button.active{background:#facc15;color:#111}
.page{display:none;padding:16px}
.page.active{display:block}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:18px;padding:16px;margin-bottom:14px}
label{display:block;margin-top:10px;color:#cbd5e1;font-weight:700}
input,select{width:100%;padding:13px;border-radius:12px;border:1px solid #334155;background:#020617;color:white;font-size:16px}
button.main{width:100%;padding:15px;margin-top:12px;border:0;border-radius:14px;background:#facc15;color:#111;font-weight:900;font-size:16px}
button.green{background:#22c55e;color:#052e16}
button.red{background:#ef4444;color:white}
button.blue{background:#38bdf8;color:#082f49}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.quick button{padding:11px;border:0;border-radius:12px;background:#1e293b;color:white;font-weight:800}
.item{background:#020617;border:1px solid #334155;border-radius:14px;padding:12px;margin-top:10px}
.big{font-size:28px;font-weight:900;color:#facc15}
.small{color:#94a3b8;font-size:14px}
</style>
</head>
<body>

<header>
  <h1>🚕 Taxi Menorca Connect</h1>
  <p>Rutas con Google Maps + servicios</p>
</header>

<div class="tabs">
  <button class="active" onclick="tab('servicio',this)">Servicio</button>
  <button onclick="tab('historial',this)">Historial</button>
  <button onclick="tab('resumen',this)">Resumen</button>
</div>

<section id="servicio" class="page active">
  <div class="card">
    <label>Origen</label>
    <input id="origen" placeholder="Ej: Mercadal">

    <label>Destino</label>
    <input id="destino" placeholder="Ej: Alaior">

    <div class="quick">
      <button onclick="poner('origen','Mercadal')">Origen Mercadal</button>
      <button onclick="poner('destino','Mercadal')">Destino Mercadal</button>
      <button onclick="poner('origen','Fornells')">Origen Fornells</button>
      <button onclick="poner('destino','Fornells')">Destino Fornells</button>
      <button onclick="poner('origen','Son Parc')">Origen Son Parc</button>
      <button onclick="poner('destino','Son Parc')">Destino Son Parc</button>
      <button onclick="poner('origen','Arenal d’en Castell')">Origen Arenal</button>
      <button onclick="poner('destino','Arenal d’en Castell')">Destino Arenal</button>
    </div>

    <button class="main blue" onclick="abrirMaps()">🗺️ Abrir ruta en Google Maps</button>

    <label>Importe cobrado</label>
    <input id="importe" type="number" step="0.01" placeholder="Ej: 15.75">

    <label>Método de pago</label>
    <select id="pago">
      <option>Efectivo</option>
      <option>Visa</option>
      <option>Bizum</option>
      <option>Bonoweb</option>
      <option>Bono Vueling</option>
    </select>

    <button class="main green" onclick="guardarServicio()">✅ Añadir servicio</button>
  </div>
</section>

<section id="historial" class="page">
  <div class="card">
    <h2>📋 Historial</h2>
    <div id="lista"></div>
    <button class="main red" onclick="borrarTodo()">🗑️ Borrar historial</button>
  </div>
</section>

<section id="resumen" class="page">
  <div class="card">
    <h2>💰 Resumen</h2>
    <p>Total trabajado:</p>
    <div class="big" id="total">0.00 €</div>
    <p>40% trabajador:</p>
    <div class="big" id="trabajador">0.00 €</div>
    <p>60% propietario:</p>
    <div class="big" id="propietario">0.00 €</div>
    <hr>
    <div id="metodos"></div>
  </div>
</section>

<script>
let servicios = JSON.parse(localStorage.getItem("serviciosMapsTaxi")) || [];

function tab(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  pintar();
}

function poner(campo,valor){
  document.getElementById(campo).value = valor;
}

function abrirMaps(){
  const origen = document.getElementById("origen").value.trim();
  const destino = document.getElementById("destino").value.trim();

  if(!origen || !destino){
    alert("Pon origen y destino primero");
    return;
  }

  const url = "https://www.google.com/maps/dir/?api=1&origin=" +
    encodeURIComponent(origen + ", Menorca") +
    "&destination=" +
    encodeURIComponent(destino + ", Menorca") +
    "&travelmode=driving";

  window.open(url, "_blank");
}

function guardarServicio(){
  const origen = document.getElementById("origen").value.trim();
  const destino = document.getElementById("destino").value.trim();
  const importe = parseFloat(document.getElementById("importe").value);
  const pago = document.getElementById("pago").value;

  if(!origen || !destino || isNaN(importe)){
    alert("Falta origen, destino o importe");
    return;
  }

  const ahora = new Date();

  servicios.unshift({
    origen,
    destino,
    importe,
    pago,
    fecha: ahora.toLocaleDateString("es-ES"),
    hora: ahora.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})
  });

  localStorage.setItem("serviciosMapsTaxi", JSON.stringify(servicios));

  document.getElementById("origen").value = "";
  document.getElementById("destino").value = "";
  document.getElementById("importe").value = "";

  hablar("Servicio añadido");
  pintar();
  alert("Servicio añadido correctamente");
}

function hablar(texto){
  if("speechSynthesis" in window){
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "es-ES";
    speechSynthesis.speak(voz);
  }
}

function pintar(){
  const lista = document.getElementById("lista");
  const totalBox = document.getElementById("total");
  const trabajadorBox = document.getElementById("trabajador");
  const propietarioBox = document.getElementById("propietario");
  const metodosBox = document.getElementById("metodos");

  let total = servicios.reduce((s,x)=>s+x.importe,0);

  totalBox.textContent = total.toFixed(2) + " €";
  trabajadorBox.textContent = (total*0.40).toFixed(2) + " €";
  propietarioBox.textContent = (total*0.60).toFixed(2) + " €";

  if(servicios.length === 0){
    lista.innerHTML = "<p class='small'>No hay servicios todavía.</p>";
  }else{
    lista.innerHTML = servicios.map(s=>`
      <div class="item">
        <b>${s.origen} → ${s.destino}</b><br>
        ${s.importe.toFixed(2)} € · ${s.pago}<br>
        <span class="small">${s.fecha} · ${s.hora}</span>
      </div>
    `).join("");
  }

  const pagos = {};
  servicios.forEach(s=>{
    pagos[s.pago] = (pagos[s.pago] || 0) + s.importe;
  });

  metodosBox.innerHTML = "<h3>Por método de pago</h3>" + Object.keys(pagos).map(k=>`
    <p><b>${k}:</b> ${pagos[k].toFixed(2)} €</p>
  `).join("");
}

function borrarTodo(){
  if(confirm("¿Seguro que quieres borrar todo?")){
    servicios = [];
    localStorage.removeItem("serviciosMapsTaxi");
    pintar();
  }
}

pintar();
</script>

</body>
</html>
