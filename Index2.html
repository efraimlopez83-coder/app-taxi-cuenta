<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Cuentas</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:15px;color:#222}
.app{max-width:520px;margin:auto;background:white;border-radius:18px;padding:18px;box-shadow:0 4px 20px #0002}
h1{text-align:center;margin-top:0}
input,select,textarea,button{width:100%;padding:12px;margin:7px 0;border-radius:10px;border:1px solid #ccc;font-size:16px;box-sizing:border-box}
button{border:0;background:#111;color:white;font-weight:bold}
.btn2{background:#555}
.btnRed{background:#b00020}
.card{background:#f1f3f5;border-radius:12px;padding:12px;margin:10px 0}
.row{display:flex;justify-content:space-between;gap:10px}
.small{font-size:13px;color:#666}
.servicio{border-bottom:1px solid #ddd;padding:8px 0}
</style>
</head>
<body>
<div class="app">
<h1>🚕 Taxi Cuentas</h1>

<input id="origen" placeholder="Origen">
<input id="destino" placeholder="Destino">
<input id="importe" type="number" step="0.01" placeholder="Importe €">

<select id="pago">
<option>Efectivo</option>
<option>Visa</option>
<option>Bizum</option>
<option>Bonoweb</option>
<option>Bono Vuelo ✈️</option>
<option>Factura / Empresa</option>
</select>

<textarea id="nota" placeholder="Notas opcionales"></textarea>
<button onclick="addServicio()">Añadir servicio</button>

<div class="card">
<h3>⛽ Gastos</h3>
<input id="gastoNombre" placeholder="Concepto gasto">
<input id="gastoImporte" type="number" step="0.01" placeholder="Importe gasto €">
<button class="btn2" onclick="addGasto()">Añadir gasto</button>
</div>

<div class="card">
<h3>📊 Resumen diario</h3>
<div id="resumen"></div>
</div>

<div class="card">
<h3>📋 Servicios de hoy</h3>
<div id="lista"></div>
</div>

<button onclick="cerrarDia()">Cerrar día y guardar historial</button>
<button class="btnRed" onclick="borrarTodo()">Borrar todo</button>

<div class="card">
<h3>📚 Historial de cierres</h3>
<div id="historial"></div>
</div>

</div>

<script>
let servicios=JSON.parse(localStorage.getItem("serviciosTaxi"))||[];
let gastos=JSON.parse(localStorage.getItem("gastosTaxi"))||[];
let historial=JSON.parse(localStorage.getItem("historialTaxi"))||[];

function guardar(){
 localStorage.setItem("serviciosTaxi",JSON.stringify(servicios));
 localStorage.setItem("gastosTaxi",JSON.stringify(gastos));
 localStorage.setItem("historialTaxi",JSON.stringify(historial));
 pintar();
}

function euro(n){return Number(n||0).toFixed(2)+" €"}

function horaActual(){
 let d=new Date();
 return d.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"});
}

function fechaActual(){
 return new Date().toLocaleDateString("es-ES");
}

function addServicio(){
 let origen=document.getElementById("origen").value;
 let destino=document.getElementById("destino").value;
 let importe=parseFloat(document.getElementById("importe").value);
 let pago=document.getElementById("pago").value;
 let nota=document.getElementById("nota").value;

 if(!importe || importe<=0){alert("Pon un importe válido");return;}

 servicios.push({origen,destino,importe,pago,nota,hora:horaActual(),fecha:fechaActual()});

 document.getElementById("origen").value="";
 document.getElementById("destino").value="";
 document.getElementById("importe").value="";
 document.getElementById("nota").value="";
 guardar();
}

function addGasto(){
 let nombre=document.getElementById("gastoNombre").value;
 let importe=parseFloat(document.getElementById("gastoImporte").value);
 if(!importe || importe<=0){alert("Pon un gasto válido");return;}
 gastos.push({nombre,importe,hora:horaActual(),fecha:fechaActual()});
 document.getElementById("gastoNombre").value="";
 document.getElementById("gastoImporte").value="";
 guardar();
}

function calcular(){
 let total=servicios.reduce((s,x)=>s+x.importe,0);
 let totalGastos=gastos.reduce((s,x)=>s+x.importe,0);
 let trabajador=total*0.40;
 let propietarioBruto=total*0.60;
 let propietarioFinal=propietarioBruto-totalGastos;

 let pagos={};
 servicios.forEach(s=>pagos[s.pago]=(pagos[s.pago]||0)+s.importe);

 return {total,totalGastos,trabajador,propietarioBruto,propietarioFinal,pagos};
}

function pintar(){
 let c=calcular();

 document.getElementById("resumen").innerHTML=`
 <p><b>Total trabajado:</b> ${euro(c.total)}</p>
 <p><b>40% trabajador:</b> ${euro(c.trabajador)}</p>
 <p><b>60% propietario bruto:</b> ${euro(c.propietarioBruto)}</p>
 <p><b>Gastos:</b> -${euro(c.totalGastos)}</p>
 <p><b>Propietario final:</b> ${euro(c.propietarioFinal)}</p>
 <hr>
 <b>Métodos de pago:</b>
 ${Object.keys(c.pagos).map(p=>`<p>${p}: ${euro(c.pagos[p])}</p>`).join("")}
 `;

 document.getElementById("lista").innerHTML=servicios.map((s,i)=>`
 <div class="servicio">
 <b>${s.hora}</b> — ${euro(s.importe)}<br>
 ${s.origen||""} ${s.destino? "→ "+s.destino:""}<br>
 <span class="small">${s.pago}${s.nota? " · "+s.nota:""}</span><br>
 <button class="btnRed" onclick="delServicio(${i})">Eliminar</button>
 </div>
 `).join("") || "<p>No hay servicios todavía.</p>";

 document.getElementById("historial").innerHTML=historial.map(h=>`
 <div class="servicio">
 <b>${h.fecha}</b><br>
 Total: ${euro(h.total)}<br>
 Trabajador 40%: ${euro(h.trabajador)}<br>
 Propietario final: ${euro(h.propietarioFinal)}
 </div>
 `).join("") || "<p>No hay cierres guardados.</p>";
}

function delServicio(i){
 servicios.splice(i,1);
 guardar();
}

function cerrarDia(){
 if(servicios.length===0){alert("No hay servicios para cerrar");return;}
 let c=calcular();
 historial.unshift({
 fecha:fechaActual(),
 total:c.total,
 trabajador:c.trabajador,
 propietarioBruto:c.propietarioBruto,
 gastos:c.totalGastos,
 propietarioFinal:c.propietarioFinal
 });
 servicios=[];
 gastos=[];
 guardar();
 alert("Día cerrado y guardado en historial");
}

function borrarTodo(){
 if(confirm("¿Seguro que quieres borrar servicios, gastos e historial?")){
 servicios=[];gastos=[];historial=[];guardar();
 }
}

pintar();
</script>
</body>
</html>
