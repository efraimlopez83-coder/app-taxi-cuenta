<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Menorca Connect V3</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#020617;color:white}
header{padding:22px;text-align:center;background:linear-gradient(135deg,#facc15,#f97316);color:#111}
header h1{margin:0;font-size:25px}
header p{margin:6px 0 0;font-weight:700}
.tabs{display:flex;background:#0f172a;position:sticky;top:0;z-index:99}
.tabs button{flex:1;padding:14px;border:0;background:#0f172a;color:#94a3b8;font-weight:900}
.tabs button.active{background:#facc15;color:#111}
.page{display:none;padding:16px}
.page.active{display:block}
.card{background:#111827;border:1px solid #1f2937;border-radius:22px;padding:16px;margin-bottom:15px;box-shadow:0 8px 24px #0007}
input,textarea,select{width:100%;padding:14px;margin:7px 0;border-radius:15px;border:1px solid #334155;background:#020617;color:white;font-size:16px}
button{cursor:pointer}
.main{width:100%;padding:15px;border:0;border-radius:16px;font-weight:900;font-size:16px;margin-top:8px}
.green{background:#22c55e;color:white}
.blue{background:#3b82f6;color:white}
.red{background:#ef4444;color:white}
.yellow{background:#facc15;color:#111}
.gray{background:#334155;color:white}
.purple{background:#8b5cf6;color:white}
.badge{display:inline-block;padding:7px 12px;border-radius:999px;font-size:13px;font-weight:900}
.pendiente{background:#facc15;color:#111}
.aceptado{background:#3b82f6;color:white}
.recogido{background:#8b5cf6;color:white}
.finalizado{background:#22c55e;color:white}
.rechazado{background:#ef4444;color:white}
.small{color:#cbd5e1;font-size:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#020617;border:1px solid #334155;border-radius:18px;padding:15px;text-align:center}
.stat b{font-size:28px;color:#facc15}
a{color:#facc15;text-decoration:none;font-weight:900}
.empty{text-align:center;color:#94a3b8;padding:20px}
hr{border:0;border-top:1px solid #334155;margin:15px 0}
</style>
</head>
<body>

<header>
<h1>🚕 Taxi Menorca Connect V3</h1>
<p>Cliente · Taxista · Central</p>
</header>

<div class="tabs">
<button class="active" onclick="showPage('cliente',this)">👤 Cliente</button>
<button onclick="showPage('taxista',this)">🚕 Taxista</button>
<button onclick="showPage('central',this)">📊 Central</button>
</div>

<section id="cliente" class="page active">
<div class="card">
<h2>Pedir taxi</h2>
<input id="cNombre" placeholder="Nombre del cliente">
<input id="cTelefono" placeholder="Teléfono">
<input id="cOrigen" placeholder="Origen">
<input id="cDestino" placeholder="Destino">
<select id="cPersonas">
<option>1 persona</option>
<option>2 personas</option>
<option>3 personas</option>
<option>4 personas</option>
<option>5 o más personas</option>
</select>
<textarea id="cNota" placeholder="Nota: maletas, silla bebé, perro..."></textarea>
<button class="main blue" onclick="usarUbicacion()">📍 Usar mi ubicación</button>
<button class="main green" onclick="pedirTaxi()">🚕 Pedir taxi</button>
</div>

<div class="card">
<h3>Estado de mi taxi</h3>
<div id="estadoCliente" class="small">Aún no has pedido taxi.</div>
</div>
</section>

<section id="taxista" class="page">
<div class="card">
<h2>Modo taxista</h2>
<input id="nombreTaxista" placeholder="Tu nombre de taxista" oninput="guardarTaxista()">
<p class="small">Ejemplo: Taxi Efra, Taxi 21, Juan Taxi...</p>
</div>

<div class="card">
<h2>Servicios disponibles</h2>
<div id="listaTaxista"></div>
</div>
</section>

<section id="central" class="page">
<div class="card">
<h2>Panel central</h2>
<div class="stats">
<div class="stat"><b id="stPendientes">0</b><br>Pendientes</div>
<div class="stat"><b id="stAceptados">0</b><br>Aceptados</div>
<div class="stat"><b id="stRecogidos">0</b><br>Recogidos</div>
<div class="stat"><b id="stFinalizados">0</b><br>Finalizados</div>
</div>
</div>

<div class="card">
<h2>Historial</h2>
<div id="historial"></div>
</div>

<div class="card">
<button class="main red" onclick="borrarTodo()">🗑️ Borrar todo</button>
</div>
</section>

<script>
let servicios = JSON.parse(localStorage.getItem("TMC_V3_SERVICIOS")) || [];
let ultimoCliente = localStorage.getItem("TMC_V3_ULTIMO") || null;
let taxistaGuardado = localStorage.getItem("TMC_V3_TAXISTA") || "";

document.getElementById("nombreTaxista").value = taxistaGuardado;

function sonido(){
  try{
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();
  }catch(e){}
}

function guardar(){
  localStorage.setItem("TMC_V3_SERVICIOS", JSON.stringify(servicios));
  render();
}

function guardarTaxista(){
  localStorage.setItem("TMC_V3_TAXISTA", document.getElementById("nombreTaxista").value);
}

function showPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
  render();
}

function usarUbicacion(){
  if(!navigator.geolocation){
    alert("Tu móvil no permite ubicación.");
    return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude.toFixed(5);
    const lon = pos.coords.longitude.toFixed(5);
    document.getElementById("cOrigen").value = "Mi ubicación: " + lat + ", " + lon;
  },()=>{
    alert("No se pudo obtener la ubicación.");
  });
}

function pedirTaxi(){
  const nombre = cNombre.value.trim();
  const telefono = cTelefono.value.trim();
  const origen = cOrigen.value.trim();
  const destino = cDestino.value.trim();
  const personas = cPersonas.value;
  const nota = cNota.value.trim();

  if(!nombre || !telefono || !origen || !destino){
    alert("Rellena nombre, teléfono, origen y destino.");
    return;
  }

  const servicio = {
    id: Date.now(),
    nombre,
    telefono,
    origen,
    destino,
    personas,
    nota,
    estado: "Pendiente",
    taxista: "",
    fecha: new Date().toLocaleDateString("es-ES"),
    hora: new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})
  };

  servicios.unshift(servicio);
  ultimoCliente = servicio.id;
  localStorage.setItem("TMC_V3_ULTIMO", ultimoCliente);
  guardar();
  sonido();

  alert("Taxi solicitado correctamente.");
}

function cambiarEstado(id, estado){
  servicios = servicios.map(s=>{
    if(s.id === id){
      s.estado = estado;
      if(estado === "Aceptado"){
        s.taxista = document.getElementById("nombreTaxista").value.trim() || "Taxi Menorca";
      }
    }
    return s;
  });
  guardar();
  sonido();
}

function borrarServicio(id){
  servicios = servicios.filter(s=>s.id !== id);
  guardar();
}

function borrarTodo(){
  if(confirm("¿Seguro que quieres borrar todos los servicios?")){
    servicios = [];
    localStorage.removeItem("TMC_V3_SERVICIOS");
    localStorage.removeItem("TMC_V3_ULTIMO");
    ultimoCliente = null;
    render();
  }
}

function badge(s){
  return `<span class="badge ${s.estado.toLowerCase()}">${s.estado}</span>`;
}

function tarjetaServicio(s, modo){
  return `
  <div class="card">
    <h3>${s.origen} → ${s.destino}</h3>
    <p>${badge(s)}</p>
    <p><b>Cliente:</b> ${s.nombre}</p>
    <p><b>Teléfono:</b> <a href="tel:${s.telefono}">${s.telefono}</a></p>
    <p><b>Personas:</b> ${s.personas}</p>
    <p><b>Hora:</b> ${s.hora} · ${s.fecha}</p>
    <p><b>Nota:</b> ${s.nota || "Sin nota"}</p>
    ${s.taxista ? `<p><b>Taxista:</b> ${s.taxista}</p>` : ""}

    ${modo === "taxista" ? `
    <hr>
    <button class="main green" onclick="cambiarEstado(${s.id},'Aceptado')">✅ Aceptar</button>
    <button class="main purple" onclick="cambiarEstado(${s.id},'Recogido')">👤 Cliente recogido</button>
    <button class="main blue" onclick="cambiarEstado(${s.id},'Finalizado')">🏁 Finalizar servicio</button>
    <button class="main red" onclick="cambiarEstado(${s.id},'Rechazado')">❌ Rechazar</button>
    <button class="main yellow" onclick="location.href='tel:${s.telefono}'">📞 Llamar cliente</button>
    ` : ""}

    <button class="main gray" onclick="borrarServicio(${s.id})">🗑️ Borrar</button>
  </div>`;
}

function render(){
  const listaTaxista = document.getElementById("listaTaxista");
  const historial = document.getElementById("historial");

  if(!servicios.length){
    listaTaxista.innerHTML = "<div class='empty'>No hay servicios todavía.</div>";
    historial.innerHTML = "<div class='empty'>Historial vacío.</div>";
  }else{
    listaTaxista.innerHTML = servicios
      .filter(s => s.estado !== "Finalizado" && s.estado !== "Rechazado")
      .map(s => tarjetaServicio(s,"taxista"))
      .join("") || "<div class='empty'>No hay servicios activos.</div>";

    historial.innerHTML = servicios
      .map(s => tarjetaServicio(s,"central"))
      .join("");
  }

  stPendientes.textContent = servicios.filter(s=>s.estado==="Pendiente").length;
  stAceptados.textContent = servicios.filter(s=>s.estado==="Aceptado").length;
  stRecogidos.textContent = servicios.filter(s=>s.estado==="Recogido").length;
  stFinalizados.textContent = servicios.filter(s=>s.estado==="Finalizado").length;

  const estadoCliente = document.getElementById("estadoCliente");
  if(ultimoCliente){
    const s = servicios.find(x => x.id == ultimoCliente);
    if(s){
      estadoCliente.innerHTML = `
      ${badge(s)}<br><br>
      <b>${s.origen}</b> → <b>${s.destino}</b><br><br>
      ${s.taxista ? `🚕 Taxista asignado: <b>${s.taxista}</b><br><br>` : "Esperando taxista..."}
      ${s.estado==="Aceptado" ? "✅ Tu taxi ha aceptado el servicio." : ""}
      ${s.estado==="Recogido" ? "👤 El cliente ya ha sido recogido." : ""}
      ${s.estado==="Finalizado" ? "🏁 Servicio finalizado." : ""}
      ${s.estado==="Rechazado" ? "❌ Servicio rechazado." : ""}
      `;
    }else{
      estadoCliente.innerHTML = "La solicitud ya no existe.";
    }
  }
}

render();
</script>

</body>
</html>
