<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Cuentas v12</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0;padding:14px;color:#1f2937}
.app{max-width:560px;margin:auto;background:white;border-radius:20px;padding:18px;box-shadow:0 6px 25px #0002}
h1{text-align:center;font-size:34px;margin:10px 0 20px}
h2,h3{margin-bottom:10px}
input,select,textarea,button{width:100%;padding:13px;margin:7px 0;border-radius:12px;border:1px solid #ccc;font-size:16px;box-sizing:border-box}
button{border:0;background:#111;color:white;font-weight:bold}
.btn2{background:#555}
.btnRed{background:#b00020}
.btnGreen{background:#12823b}
.card{background:#f1f3f5;border-radius:16px;padding:14px;margin:14px 0}
.item{background:white;border-radius:12px;padding:10px;margin:8px 0;border:1px solid #ddd}
.hora{font-size:20px;font-weight:bold;color:#111}
.small{font-size:13px;color:#666}
.total{font-size:18px;font-weight:bold}
hr{border:0;border-top:1px solid #ddd;margin:12px 0}
</style>
</head>
<body>
<div class="app">
<h1>🚕 Taxi Cuentas v12</h1>

<div class="card">
<h3>➕ Añadir servicio</h3>
<input id="origen" placeholder="Origen">
<input id="destino" placeholder="Destino">
<input id="importe" type="number" step="0.01" placeholder="Importe €">
<select id="pago">
<option>Efectivo</option>
<option>Visa</option>
<option>Bizum</option>
<option>Bonoweb</option>
<option>Bono Vuelo ✈️</option>
<option>Factura / Empresa</option>
</select>
<textarea id="nota" placeholder="Notas opcionales"></textarea>
<button onclick="addServicio()">Añadir servicio</button>
</div>

<div class="card">
<h3>⛽ Gastos</h3>
<input id="gastoNombre" placeholder="Concepto gasto">
<input id="gastoImporte" type="number" step="0.01" placeholder="Importe gasto €">
<button class="btn2" onclick="addGasto()">Añadir gasto</button>
<div id="listaGastos"></div>
</div>

<div class="card">
<h3>📊 Resumen diario</h3>
<div id="resumenDia"></div>
</div>

<div class="card">
<h3>📅 Resumen semanal</h3>
<div id="resumenSemana"></div>
</div>

<div class="card">
<h3>📋 Servicios de hoy</h3>
<div id="listaServicios"></div>
</div>

<button class="btnGreen" onclick="cerrarDia()">Cerrar día y guardar historial</button>
<button class="btnRed" onclick="borrarTodo()">Borrar todo</button>

<div class="card">
<h3>📚 Historial de cierres</h3>
<div id="historial"></div>
</div>
</div>

<script>
let servicios=JSON.parse(localStorage.getItem("serviciosTaxiV12"))||[];
let gastos=JSON.parse(localStorage.getItem("gastosTaxiV12"))||[];
let historial=JSON.parse(localStorage.getItem("historialTaxiV12"))||[];

function guardar(){
 localStorage.setItem("serviciosTaxiV12",JSON.stringify(servicios));
 localStorage.setItem("gastosTaxiV12",JSON.stringify(gastos));
 localStorage.setItem("historialTaxiV12",JSON.stringify(historial));
 pintar();
}

function euro(n){return Number(n||0).toFixed(2)+" €"}
function hoy(){return new Date().toLocaleDateString("es-ES")}
function hora(){return new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}

function semanaActual(fechaStr){
 let hoyDate=new Date();
 let d=new Date(hoyDate);
 let dia=d.getDay();
 let diff=d.getDate()-(dia===0?6:dia-1);
 let lunes=new Date(d.setDate(diff));
 lunes.setHours(0,0,0,0);
 return lunes;
}

function parseFechaES(f){
 let p=f.split("/");
 return new Date(p[2],p[1]-1,p[0]);
}

function esEstaSemana(f){
 let fecha=parseFechaES(f);
 let lunes=semanaActual();
 let domingo=new Date(lunes);
 domingo.setDate(lunes.getDate()+6);
 domingo.setHours(23,59,59,999);
 return fecha>=lunes && fecha<=domingo;
}

function addServicio(){
 let origen=document.getElementById("origen").value.trim();
 let destino=document.getElementById("destino").value.trim();
 let importe=parseFloat(document.getElementById("importe").value);
 let pago=document.getElementById("pago").value;
 let nota=document.getElementById("nota").value.trim();
 if(!importe || importe<=0){alert("Pon un importe válido");return;}
 servicios.push({origen,destino,importe,pago,nota,hora:hora(),fecha:hoy()});
 document.getElementById("origen").value="";
 document.getElementById("destino").value="";
 document.getElementById("importe").value="";
 document.getElementById("nota").value="";
 guardar();
}

function addGasto(){
 let nombre=document.getElementById("gastoNombre").value.trim();
 let importe=parseFloat(document.getElementById("gastoImporte").value);
 if(!importe || importe<=0){alert("Pon un gasto válido");return;}
 gastos.push({nombre,importe,hora:hora(),fecha:hoy()});
 document.getElementById("gastoNombre").value="";
 document.getElementById("gastoImporte").value="";
 guardar();
}

function calcular(listaServicios,listaGastos){
 let total=listaServicios.reduce((s,x)=>s+x.importe,0);
 let totalGastos=listaGastos.reduce((s,x)=>s+x.importe,0);
 let trabajador=total*0.40;
 let propietarioBruto=total*0.60;
 let propietarioFinal=propietarioBruto-totalGastos;
 let pagos={};
 listaServicios.forEach(s=>pagos[s.pago]=(pagos[s.pago]||0)+s.importe);
 return {total,totalGastos,trabajador,propietarioBruto,propietarioFinal,pagos};
}

function bloqueResumen(c){
 return `
 <p class="total">Total trabajado: ${euro(c.total)}</p>
 <p>👷 40% trabajador: <b>${euro(c.trabajador)}</b></p>
 <p>🏢 60% propietario bruto: <b>${euro(c.propietarioBruto)}</b></p>
 <p>⛽ Gastos: <b>-${euro(c.totalGastos)}</b></p>
 <p>✅ Propietario final: <b>${euro(c.propietarioFinal)}</b></p>
 <hr>
 <b>💳 Por método de pago:</b>
 ${Object.keys(c.pagos).length?Object.keys(c.pagos).map(p=>`<p>${p}: <b>${euro(c.pagos[p])}</b></p>`).join(""):"<p>No hay pagos todavía.</p>"}
 `;
}

function pintar(){
 let cDia=calcular(servicios,gastos);
 document.getElementById("resumenDia").innerHTML=bloqueResumen(cDia);

 let serviciosSemana=[...servicios,...historial.filter(h=>esEstaSemana(h.fecha)).map(h=>({
   importe:h.total,pago:"Cierres anteriores",fecha:h.fecha,hora:""
 }))];
 let gastosSemana=[...gastos,...historial.filter(h=>esEstaSemana(h.fecha)).map(h=>({
   importe:h.gastos||0,fecha:h.fecha
 }))];
 let cSemana=calcular(serviciosSemana,gastosSemana);
 document.getElementById("resumenSemana").innerHTML=bloqueResumen(cSemana);

 document.getElementById("listaServicios").innerHTML=servicios.length?servicios.map((s,i)=>`
 <div class="item">
 <div class="hora">🕒 ${s.hora}</div>
 <b>${euro(s.importe)}</b> · ${s.pago}<br>
 ${s.origen||""}${s.destino?" → "+s.destino:""}<br>
 <span class="small">${s.nota||""}</span>
 <button class="btnRed" onclick="delServicio(${i})">Eliminar servicio</button>
 </div>
 `).join(""):"<p>No hay servicios todavía.</p>";

 document.getElementById("listaGastos").innerHTML=gastos.length?gastos.map((g,i)=>`
 <div class="item">
 <b>${g.hora}</b> · ${g.nombre||"Gasto"}: ${euro(g.importe)}
 <button class="btnRed" onclick="delGasto(${i})">Eliminar gasto</button>
 </div>
 `).join(""):"<p>No hay gastos todavía.</p>";

 document.getElementById("historial").innerHTML=historial.length?historial.map(h=>`
 <div class="item">
 <b>${h.fecha}</b><br>
 Total: ${euro(h.total)}<br>
 Trabajador 40%: ${euro(h.trabajador)}<br>
 Gastos: ${euro(h.gastos)}<br>
 Propietario final: ${euro(h.propietarioFinal)}
 </div>
 `).join(""):"<p>No hay cierres guardados.</p>";
}

function delServicio(i){servicios.splice(i,1);guardar();}
function delGasto(i){gastos.splice(i,1);guardar();}

function cerrarDia(){
 if(servicios.length===0){alert("No hay servicios para cerrar");return;}
 let c=calcular(servicios,gastos);
 historial.unshift({
 fecha:hoy(),
 total:c.total,
 trabajador:c.trabajador,
 propietarioBruto:c.propietarioBruto,
 gastos:c.totalGastos,
 propietarioFinal:c.propietarioFinal
 });
 servicios=[];
 gastos=[];
 guardar();
 alert("Día cerrado y guardado");
}

function borrarTodo(){
 if(confirm("¿Seguro que quieres borrar servicios, gastos e historial?")){
 servicios=[];gastos=[];historial=[];guardar();
 }
}

pintar();
</script>
</body>
</html>
