<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Menorca Connect V5</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#020617;color:white}
header{padding:22px;text-align:center;background:linear-gradient(135deg,#facc15,#f97316);color:#111}
header h1{margin:0;font-size:24px}
header p{margin:6px 0 0;font-weight:800}
.tabs{display:flex;overflow-x:auto;background:#0f172a;position:sticky;top:0;z-index:99}
.tabs button{min-width:120px;flex:1;padding:14px;border:0;background:#0f172a;color:#94a3b8;font-weight:900}
.tabs button.active{background:#facc15;color:#111}
.page{display:none;padding:16px}
.page.active{display:block}
.card{background:#111827;border:1px solid #1f2937;border-radius:22px;padding:16px;margin-bottom:15px;box-shadow:0 8px 22px #0008}
input,textarea,select{width:100%;padding:14px;margin:7px 0;border-radius:15px;border:1px solid #334155;background:#020617;color:white;font-size:16px}
button{cursor:pointer}
.main{width:100%;padding:15px;border:0;border-radius:16px;font-weight:900;font-size:16px;margin-top:8px}
.green{background:#22c55e;color:white}.blue{background:#3b82f6;color:white}.red{background:#ef4444;color:white}
.yellow{background:#facc15;color:#111}.gray{background:#334155;color:white}.purple{background:#8b5cf6;color:white}
.badge{display:inline-block;padding:7px 12px;border-radius:999px;font-size:13px;font-weight:900}
.Pendiente{background:#facc15;color:#111}.Aceptado{background:#3b82f6;color:white}.Recogido{background:#8b5cf6;color:white}
.Finalizado{background:#22c55e;color:white}.Rechazado{background:#ef4444;color:white}.Reserva{background:#14b8a6;color:white}
.small{color:#cbd5e1;font-size:14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:#020617;border:1px solid #334155;border-radius:18px;padding:15px;text-align:center}
.stat b{font-size:28px;color:#facc15}a{color:#facc15;text-decoration:none;font-weight:900}.empty{text-align:center;color:#94a3b8;padding:20px}
</style>
</head>
<body>

<header>
<h1>🚕 Taxi Menorca Connect V5</h1>
<p>Cliente · Taxista · Central IA · Panel</p>
</header>

<div class="tabs">
<button class="active" onclick="showPage('cliente',this)">👤 Cliente</button>
<button onclick="showPage('ia',this)">🤖 Central IA</button>
<button onclick="showPage('taxista',this)">🚕 Taxista</button>
<button onclick="showPage('panel',this)">📊 Panel</button>
</div>

<section id="cliente" class="page active">
<div class="card">
<h2>Pedir taxi</h2>
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="origen" placeholder="Origen">
<input id="destino" placeholder="Destino">
<select id="personas">
<option>1 persona</option><option>2 personas</option><option>3 personas</option><option>4 personas</option><option>5 o más</option>
</select>
<select id="tipo">
<option>Ahora</option><option>Reserva</option>
</select>
<input id="horaReserva" placeholder="Hora reserva, ejemplo 18:30">
<textarea id="nota" placeholder="Nota: maletas, silla bebé, mascota..."></textarea>
<button class="main blue" onclick="ubicacion()">📍 Usar ubicación</button>
<button class="main green" onclick="crearServicio('Cliente')">🚕 Pedir taxi</button>
</div>
<div class="card"><h3>Estado</h3><div id="estadoCliente" class="small">Aún no has pedido taxi.</div></div>
</section>

<section id="ia" class="page">
<div class="card">
<h2>🤖 Simular llamada IA</h2>
<p class="small">Escribe como si el cliente llamara.</p>
<textarea id="textoIA" placeholder="Ejemplo: Hola, necesito taxi desde Hotel Aguamarina hasta Aeropuerto para 2 personas a las 18:30 con maletas. Me llamo Juan y mi teléfono es 600123123"></textarea>
<button class="main yellow" onclick="iaCrear()">🤖 Crear servicio con IA</button>
</div>
</section>

<section id="taxista" class="page">
<div class="card">
<h2>Modo taxista</h2>
<input id="taxistaNombre" placeholder="Nombre del taxista" oninput="localStorage.setItem('TMCV5_TAXISTA',this.value)">
</div>
<div id="listaTaxista"></div>
</section>

<section id="panel" class="page">
<div class="card">
<h2>Panel central</h2>
<div class="stats">
<div class="stat"><b id="pPend">0</b><br>Pendientes</div>
<div class="stat"><b id="pAcep">0</b><br>Aceptados</div>
<div class="stat"><b id="pReco">0</b><br>Recogidos</div>
<div class="stat"><b id="pFin">0</b><br>Finalizados</div>
</div>
</div>
<div class="card"><h2>Historial</h2><div id="historial"></div></div>
<div class="card"><button class="main red" onclick="borrarTodo()">🗑️ Borrar todo</button></div>
</section>

<script>
let servicios=JSON.parse(localStorage.getItem("TMCV5_SERVICIOS"))||[];
let ultimo=localStorage.getItem("TMCV5_ULTIMO")||null;
taxistaNombre.value=localStorage.getItem("TMCV5_TAXISTA")||"";

function sonido(){try{new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()}catch(e){}}
function guardar(){localStorage.setItem("TMCV5_SERVICIOS",JSON.stringify(servicios));render()}
function showPage(id,btn){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));document.getElementById(id).classList.add("active");btn.classList.add("active");render()}

function ubicacion(){
 navigator.geolocation?.getCurrentPosition(p=>{
  origen.value="Mi ubicación: "+p.coords.latitude.toFixed(5)+", "+p.coords.longitude.toFixed(5)
 },()=>alert("No se pudo obtener ubicación"))
}

function crearServicio(origenModo){
 if(!nombre.value||!telefono.value||!origen.value||!destino.value){alert("Faltan datos");return}
 let s={
  id:Date.now(),creadoPor:origenModo,nombre:nombre.value,telefono:telefono.value,origen:origen.value,destino:destino.value,
  personas:personas.value,tipo:tipo.value,horaReserva:horaReserva.value,nota:nota.value,estado:"Pendiente",taxista:"",
  fecha:new Date().toLocaleDateString("es-ES"),hora:new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})
 };
 servicios.unshift(s);ultimo=s.id;localStorage.setItem("TMCV5_ULTIMO",ultimo);guardar();sonido();alert("Servicio creado")
}

function iaCrear(){
 let t=textoIA.value;
 if(!t){alert("Escribe la llamada simulada");return}
 nombre.value=(t.match(/me llamo ([a-záéíóúñ ]+)/i)||[])[1]||"Cliente IA";
 telefono.value=(t.match(/(6\d{8}|7\d{8})/)||[])[1]||"";
 origen.value=(t.match(/desde (.*?) hasta/i)||[])[1]||"Origen por confirmar";
 destino.value=(t.match(/hasta (.*?)( para| a las| con|$)/i)||[])[1]||"Destino por confirmar";
 personas.value=(t.match(/(\d+) persona/i)||[])[1]?t.match(/(\d+) persona/i)[1]+" persona":"1 persona";
 horaReserva.value=(t.match(/(\d{1,2}:\d{2})/)||[])[1]||"";
 tipo.value=horaReserva.value?"Reserva":"Ahora";
 nota.value=t.toLowerCase().includes("maleta")?"Maletas":"";
 crearServicio("Central IA");
}

function estado(id,e){
 servicios=servicios.map(s=>{
  if(s.id===id){
   s.estado=e;
   if(e==="Aceptado")s.taxista=taxistaNombre.value||"Taxi Menorca";
  }
  return s;
 });
 guardar();sonido()
}

function borrar(id){servicios=servicios.filter(s=>s.id!==id);guardar()}
function borrarTodo(){if(confirm("¿Borrar todo?")){servicios=[];localStorage.clear();guardar()}}

function tarjeta(s,modo){
 let wa=`https://wa.me/34${s.telefono}?text=Hola ${s.nombre}, soy ${s.taxista||"Taxi Menorca"}. Tu taxi para ${s.origen} → ${s.destino} está ${s.estado.toLowerCase()}.`;
 return `<div class="card">
 <h3>${s.origen} → ${s.destino}</h3>
 <p><span class="badge ${s.estado}">${s.estado}</span> ${s.tipo==="Reserva"?'<span class="badge Reserva">Reserva</span>':''}</p>
 <p><b>Cliente:</b> ${s.nombre}</p>
 <p><b>Tel:</b> <a href="tel:${s.telefono}">${s.telefono}</a></p>
 <p><b>Personas:</b> ${s.personas}</p>
 <p><b>Hora:</b> ${s.hora} · ${s.fecha}</p>
 ${s.horaReserva?`<p><b>Reserva:</b> ${s.horaReserva}</p>`:""}
 <p><b>Nota:</b> ${s.nota||"Sin nota"}</p>
 ${s.taxista?`<p><b>Taxista:</b> ${s.taxista}</p>`:""}
 ${modo==="taxista"?`
 <button class="main green" onclick="estado(${s.id},'Aceptado')">✅ Aceptar</button>
 <button class="main purple" onclick="estado(${s.id},'Recogido')">👤 Recogido</button>
 <button class="main blue" onclick="estado(${s.id},'Finalizado')">🏁 Finalizar</button>
 <button class="main red" onclick="estado(${s.id},'Rechazado')">❌ Rechazar</button>
 <button class="main yellow" onclick="location.href='tel:${s.telefono}'">📞 Llamar</button>
 <button class="main green" onclick="location.href='${wa}'">💬 WhatsApp</button>`:""}
 <button class="main gray" onclick="borrar(${s.id})">🗑️ Borrar</button>
 </div>`
}

function render(){
 listaTaxista.innerHTML=servicios.filter(s=>!["Finalizado","Rechazado"].includes(s.estado)).map(s=>tarjeta(s,"taxista")).join("")||"<div class='empty'>Sin servicios activos</div>";
 historial.innerHTML=servicios.map(s=>tarjeta(s,"panel")).join("")||"<div class='empty'>Historial vacío</div>";
 pPend.textContent=servicios.filter(s=>s.estado==="Pendiente").length;
 pAcep.textContent=servicios.filter(s=>s.estado==="Aceptado").length;
 pReco.textContent=servicios.filter(s=>s.estado==="Recogido").length;
 pFin.textContent=servicios.filter(s=>s.estado==="Finalizado").length;
 if(ultimo){
  let s=servicios.find(x=>x.id==ultimo);
  estadoCliente.innerHTML=s?`<span class="badge ${s.estado}">${s.estado}</span><br><br>${s.origen} → ${s.destino}<br>${s.taxista?`🚕 Taxista: <b>${s.taxista}</b>`:"Esperando taxista..."}`:"Solicitud borrada";
 }
}
render();
</script>
</body>
</html>
